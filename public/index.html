<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>闪传 | Flashdrop</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Ccircle cx='256' cy='256' r='256' fill='%232563eb'/%3E%3Cpath fill='%23ffffff' transform='translate(128, 137) scale(0.46)' d='M498.1 5.6c10.1 7 15.4 19.1 13.5 31.2l-64 416c-1.5 9.7-7.4 18.2-16 23s-18.9 5.4-28 1.6L284 427.7l-68.5 74.1c-8.9 9.7-22.9 12.9-35.2 8.1S160 493.2 160 480V396.4c0-4 1.5-7.8 4.2-10.7L331.8 202.8c5.8-6.3 5.6-16-.4-22s-15.7-6.4-22-.7L106 360.8 17.7 316.6C7.1 311.3 .3 300.7 0 288.9s5.9-22.8 16.1-28.7l448-256c10.7-6.1 23.9-5.5 34 1.4z'/%3E%3C/svg%3E" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'media' };</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/htm/3.1.1/htm.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── Keyframes ── */
        @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
        @keyframes shake   { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
        @keyframes toastIn { from{opacity:0;transform:translateY(-8px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }
        @keyframes pageInRight  { from{opacity:0;transform:translateX(22px) scale(0.98)}  to{opacity:1;transform:none} }
        @keyframes pageInLeft   { from{opacity:0;transform:translateX(-22px) scale(0.98)} to{opacity:1;transform:none} }
        @keyframes pageOutLeft  { from{opacity:1;transform:none} to{opacity:0;transform:translateX(-16px) scale(0.98)} }
        @keyframes pageOutRight { from{opacity:1;transform:none} to{opacity:0;transform:translateX(16px)  scale(0.98)} }
        @keyframes pageInHome   { from{opacity:0;transform:scale(0.97)} to{opacity:1;transform:none} }

        .animate-fade-in       { animation: fadeIn 0.2s ease-out forwards; }
        .animate-shake         { animation: shake 0.4s ease-in-out forwards; }
        .animate-toast         { animation: toastIn 0.2s ease-out forwards; }
        /* Enter is delayed until the exit finishes, so the two layers never overlap.
           `both` fill-mode holds the entering view at opacity:0 during the delay. */
        .page-out-left         { animation: pageOutLeft  0.15s ease-in forwards; }
        .page-out-right        { animation: pageOutRight 0.15s ease-in forwards; }
        .page-in-right         { animation: pageInRight  0.26s cubic-bezier(0.22,1,0.36,1) 0.15s both; }
        .page-in-left          { animation: pageInLeft   0.26s cubic-bezier(0.22,1,0.36,1) 0.15s both; }
        .page-in-home          { animation: pageInHome   0.24s ease-out 0.15s both; }

        .no-scrollbar::-webkit-scrollbar { display:none }
        .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none }

        /* Glass card */
        .glass-card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px) saturate(1.8);
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 20px 60px -16px rgba(37,99,235,0.12), 0 0 0 1px rgba(0,0,0,0.04);
        }

        /* Keypad button press ripple */
        .key-btn { position:relative; overflow:hidden; }
        .key-btn::after {
            content:''; position:absolute; inset:0;
            background: radial-gradient(circle at center, rgba(0,0,0,0.08) 0%, transparent 70%);
            opacity:0; transition:opacity 0.15s;
        }
        .key-btn:active::after { opacity:1; }

        @media (prefers-color-scheme: dark) {
            body { background-color: #0a0f1e; }
            .glass-card {
                background: rgba(18,26,46,0.92);
                border: 1px solid rgba(148,163,184,0.08);
                box-shadow: 0 20px 60px -16px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04);
            }
            .key-btn::after { background: radial-gradient(circle at center, rgba(255,255,255,0.07) 0%, transparent 70%); }
        }
    </style>
</head>
<body class="text-slate-800 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">

    <!-- Startup skeleton -->
    <div id="startup-loader" class="fixed inset-0 bg-[#f1f5f9] dark:bg-[#0a0f1e] z-50 flex items-center justify-center transition-opacity duration-400 pointer-events-none">
        <div class="relative w-full max-w-md h-[660px] max-h-[90vh] glass-card rounded-[2rem] flex flex-col items-center justify-center mx-4">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
            <p class="text-slate-400 text-sm font-medium animate-pulse">正在加载...</p>
        </div>
    </div>

    <div id="root" class="w-full max-w-md"></div>

    <script>
    const { useState, useEffect, useRef, useCallback, useContext, createContext } = React;
    const html = htm.bind(React.createElement);

    const API = '/api';
    const ToastCtx = createContext(() => {});

    const APP_ICON = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Ccircle cx='256' cy='256' r='256' fill='%232563eb'/%3E%3Cpath fill='%23ffffff' transform='translate(128, 137) scale(0.46)' d='M498.1 5.6c10.1 7 15.4 19.1 13.5 31.2l-64 416c-1.5 9.7-7.4 18.2-16 23s-18.9 5.4-28 1.6L284 427.7l-68.5 74.1c-8.9 9.7-22.9 12.9-35.2 8.1S160 493.2 160 480V396.4c0-4 1.5-7.8 4.2-10.7L331.8 202.8c5.8-6.3 5.6-16-.4-22s-15.7-6.4-22-.7L106 360.8 17.7 316.6C7.1 311.3 .3 300.7 0 288.9s5.9-22.8 16.1-28.7l448-256c10.7-6.1 23.9-5.5 34 1.4z'/%3E%3C/svg%3E";

    // ── Utilities ──────────────────────────────────────────────────────────────
    const formatBytes = (b) => {
        if (!b) return '0 B';
        const k = 1024, u = ['B','KB','MB','GB'];
        const i = Math.floor(Math.log(b) / Math.log(k));
        return `${+(b / k**i).toFixed(1)} ${u[i]}`;
    };

    const formatSpeed = (bps) => {
        if (!bps || !isFinite(bps)) return '–';
        const k = 1024, u = ['B/s','KB/s','MB/s','GB/s'];
        const i = Math.floor(Math.log(bps) / Math.log(k));
        return `${+(bps / k**i).toFixed(1)} ${u[i]}`;
    };

    const FILE_ICONS = {
        pdf:  ['fa-file-pdf',        'text-red-500'],
        doc:  ['fa-file-word',       'text-blue-600'],  docx: ['fa-file-word',  'text-blue-600'],
        xls:  ['fa-file-excel',      'text-green-600'], xlsx: ['fa-file-excel', 'text-green-600'],
        ppt:  ['fa-file-powerpoint', 'text-orange-500'],pptx:['fa-file-powerpoint','text-orange-500'],
        txt:  ['fa-file-lines',      'text-slate-500'], md:  ['fa-file-lines',  'text-slate-500'],
        csv:  ['fa-file-csv',        'text-emerald-600'],
        jpg:  ['fa-file-image',      'text-violet-500'],jpeg:['fa-file-image',  'text-violet-500'],
        png:  ['fa-file-image',      'text-violet-500'],gif: ['fa-file-image',  'text-violet-500'],
        webp: ['fa-file-image',      'text-violet-500'],svg: ['fa-file-image',  'text-violet-500'],
        mp4:  ['fa-file-video',      'text-pink-500'],  mov: ['fa-file-video',  'text-pink-500'],
        avi:  ['fa-file-video',      'text-pink-500'],  mkv: ['fa-file-video',  'text-pink-500'],
        mp3:  ['fa-file-audio',      'text-amber-500'], wav: ['fa-file-audio',  'text-amber-500'],
        flac: ['fa-file-audio',      'text-amber-500'], aac: ['fa-file-audio',  'text-amber-500'],
        zip:  ['fa-file-zipper',     'text-slate-400'], rar: ['fa-file-zipper', 'text-slate-400'],
        '7z': ['fa-file-zipper',     'text-slate-400'], tar: ['fa-file-zipper', 'text-slate-400'],
        gz:   ['fa-file-zipper',     'text-slate-400'],
        js:   ['fa-file-code',       'text-yellow-500'],ts:  ['fa-file-code',   'text-blue-500'],
        py:   ['fa-file-code',       'text-blue-400'],  java:['fa-file-code',   'text-orange-400'],
        html: ['fa-file-code',       'text-orange-500'],css: ['fa-file-code',   'text-blue-400'],
        json: ['fa-file-code',       'text-yellow-600'],
    };

    const getFileIcon = (name) => {
        const ext = (name.split('.').pop() || '').toLowerCase();
        const [icon, color] = FILE_ICONS[ext] || ['fa-file', 'text-slate-400'];
        return { cls: `fa-solid ${icon}`, color };
    };

    const copyText = async (text) => {
        if (navigator.clipboard && window.isSecureContext) {
            try { await navigator.clipboard.writeText(text); return true; } catch {}
        }
        try {
            const ta = Object.assign(document.createElement('textarea'), { value: text });
            Object.assign(ta.style, { position:'fixed', top:'-9999px', left:'-9999px' });
            document.body.appendChild(ta); ta.select();
            const ok = document.execCommand('copy');
            document.body.removeChild(ta);
            return ok;
        } catch { return false; }
    };

    // ── Toast ──────────────────────────────────────────────────────────────────
    const Toasts = ({ list }) => {
        if (!list.length) return null;
        return html`
            <div className="absolute inset-x-3 z-50 flex flex-col gap-1.5 pointer-events-none" style=${{ top: '76px' }}>
                ${list.map(t => html`
                    <div key=${t.id} className=${`animate-toast flex items-center gap-2.5 px-4 py-2.5 rounded-xl text-sm font-medium text-white shadow-xl pointer-events-auto
                        ${t.type === 'success' ? 'bg-emerald-500 shadow-emerald-500/30' : 'bg-red-500 shadow-red-500/30'}`}>
                        <i className=${`fa-solid ${t.type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation'} text-base`}></i>
                        ${t.msg}
                    </div>
                `)}
            </div>
        `;
    };

    // ── HomeView ───────────────────────────────────────────────────────────────
    const HomeView = ({ setView }) => html`
        <div className="absolute inset-0 flex flex-col items-center justify-center px-6 gap-10">

            <!-- Logo + text: one group, centered together with buttons -->
            <div className="flex flex-col items-center text-center">
                <img src=${APP_ICON} alt="Flashdrop" className="w-[88px] h-[88px] mb-5 drop-shadow-xl" />
                <h1 className="text-[32px] font-bold text-slate-800 dark:text-slate-100 tracking-tight mb-2">闪传</h1>
                <p className="text-slate-600 dark:text-slate-300 font-semibold text-[15px]">简单、快速的文件传输</p>
                <p className="text-slate-400 dark:text-slate-500 text-sm mt-1">无需登录，即用即走</p>
            </div>

            <!-- Buttons -->
            <div className="flex flex-col gap-3.5 w-full">
                <button onClick=${() => setView('send')}
                    className="group w-full p-5 bg-white dark:bg-slate-800/80 border-2 border-transparent rounded-2xl
                        hover:border-blue-500/60 hover:shadow-xl hover:shadow-blue-500/10 hover:bg-blue-50/30 dark:hover:bg-blue-500/5
                        transition-all duration-200 flex items-center gap-4 text-left active:scale-[0.985]">
                    <div className="w-[52px] h-[52px] rounded-2xl bg-blue-100 dark:bg-blue-500/15 text-blue-600 dark:text-blue-400 flex items-center justify-center
                        group-hover:bg-blue-600 group-hover:text-white group-hover:shadow-lg group-hover:shadow-blue-500/30
                        transition-all duration-200 shrink-0">
                        <i className="fa-solid fa-cloud-arrow-up text-xl"></i>
                    </div>
                    <div className="flex-1">
                        <h2 className="text-[15px] font-bold text-slate-800 dark:text-slate-100">发送文件</h2>
                        <p className="text-slate-400 dark:text-slate-500 text-xs mt-0.5">获取取件码以分享给对方</p>
                    </div>
                    <i className="fa-solid fa-chevron-right text-slate-300 dark:text-slate-600 group-hover:text-blue-400 transition-colors text-sm"></i>
                </button>

                <button onClick=${() => setView('receive')}
                    className="group w-full p-5 bg-white dark:bg-slate-800/80 border-2 border-transparent rounded-2xl
                        hover:border-emerald-500/60 hover:shadow-xl hover:shadow-emerald-500/10 hover:bg-emerald-50/30 dark:hover:bg-emerald-500/5
                        transition-all duration-200 flex items-center gap-4 text-left active:scale-[0.985]">
                    <div className="w-[52px] h-[52px] rounded-2xl bg-emerald-100 dark:bg-emerald-500/15 text-emerald-600 dark:text-emerald-400 flex items-center justify-center
                        group-hover:bg-emerald-600 group-hover:text-white group-hover:shadow-lg group-hover:shadow-emerald-500/30
                        transition-all duration-200 shrink-0">
                        <i className="fa-solid fa-cloud-arrow-down text-xl"></i>
                    </div>
                    <div className="flex-1">
                        <h2 className="text-[15px] font-bold text-slate-800 dark:text-slate-100">接收文件</h2>
                        <p className="text-slate-400 dark:text-slate-500 text-xs mt-0.5">输入取件码以下载内容</p>
                    </div>
                    <i className="fa-solid fa-chevron-right text-slate-300 dark:text-slate-600 group-hover:text-emerald-400 transition-colors text-sm"></i>
                </button>
            </div>
        </div>
    `;

    // ── SendView ───────────────────────────────────────────────────────────────
    const TIME_OPTIONS = [
        { label: '1 小时', value: '1h'  },
        { label: '10 小时', value: '10h' },
        { label: '1 天',   value: '1d'  },
        { label: '3 天',   value: '3d'  },
        { label: '7 天',   value: '7d'  },
    ];

    const SendView = ({ setView, setGeneratedCodes, setRetentionDisplay }) => {
        const showToast = useContext(ToastCtx);
        const [files, setFiles]         = useState([]);
        const [message, setMessage]     = useState('');
        const [timeIndex, setTimeIndex] = useState(1);
        const [quantity, setQuantity]   = useState(1);
        const [isDragging, setIsDrag]   = useState(false);
        const [isUploading, setUploading] = useState(false);
        const [processing, setProcessing] = useState(false);
        const [progress, setProgress]   = useState(0);
        const [speed, setSpeed]         = useState('');
        const [error, setError]         = useState('');
        const fileRef = useRef(null);

        const addFiles = (incoming) => {
            setError('');
            setFiles(prev => [...prev, ...Array.from(incoming)]);
        };

        const handleSubmit = () => {
            if (!files.length && !message.trim()) return;
            setUploading(true); setProcessing(false); setProgress(0); setSpeed(''); setError('');

            const fd = new FormData();
            files.forEach(f => fd.append('files', f));
            fd.append('message', message.trim());
            fd.append('retention', TIME_OPTIONS[timeIndex].value);
            fd.append('quantity', quantity);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', `${API}/upload`, true);

            let lastLoaded = 0, lastTime = Date.now();
            xhr.upload.onprogress = (e) => {
                if (!e.lengthComputable) return;
                const pct = Math.floor(e.loaded / e.total * 100);
                setProgress(pct);
                const now = Date.now(), dt = (now - lastTime) / 1000;
                if (dt >= 0.5) {
                    setSpeed(formatSpeed((e.loaded - lastLoaded) / dt));
                    lastLoaded = e.loaded; lastTime = now;
                }
                // Bytes are flushed to the socket; the server is still receiving + writing.
                // Switch to an indeterminate "processing" state so 100% never looks frozen.
                if (e.loaded >= e.total) { setProcessing(true); setSpeed(''); }
            };
            xhr.onload = () => {
                setUploading(false); setProcessing(false);
                if (xhr.status >= 200 && xhr.status < 300) {
                    try {
                        const data = JSON.parse(xhr.responseText);
                        setGeneratedCodes(data.codes);
                        setRetentionDisplay(TIME_OPTIONS[timeIndex].label);
                        setView('code');
                    } catch { setError('服务器响应异常'); }
                } else {
                    try { setError(JSON.parse(xhr.responseText).error || '上传失败，请重试'); }
                    catch { setError(xhr.status === 413 ? '文件超出 5GB 限制' : `上传失败 (${xhr.status})`); }
                }
            };
            xhr.onerror = () => { setUploading(false); setProcessing(false); setError('网络异常，请检查连接'); };
            xhr.send(fd);
        };

        const totalSize = files.reduce((s, f) => s + f.size, 0);
        const canSubmit = (files.length > 0 || message.trim()) && !isUploading;

        const Stepper = ({ label, value, dec, inc, disableDec, disableInc }) => html`
            <div className="flex flex-col gap-1.5 flex-1">
                <label className="text-[10px] text-slate-400 dark:text-slate-500 font-bold uppercase tracking-widest text-center">${label}</label>
                <div className="flex items-center justify-between border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden bg-white dark:bg-slate-800 h-10 hover:border-blue-400/60 dark:hover:border-blue-500/50 transition-colors">
                    <button onClick=${dec} disabled=${disableDec} className="w-10 h-full flex items-center justify-center text-slate-400 dark:text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-700/60 disabled:opacity-25 border-r border-slate-100 dark:border-slate-700 transition-colors">
                        <i className="fa-solid fa-minus text-[10px]"></i>
                    </button>
                    <span className="flex-1 text-center font-bold text-slate-700 dark:text-slate-200 text-sm select-none">${value}</span>
                    <button onClick=${inc} disabled=${disableInc} className="w-10 h-full flex items-center justify-center text-slate-400 dark:text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-700/60 disabled:opacity-25 border-l border-slate-100 dark:border-slate-700 transition-colors">
                        <i className="fa-solid fa-plus text-[10px]"></i>
                    </button>
                </div>
            </div>
        `;

        return html`
            <div className="absolute inset-0 flex flex-col">
                <div className="flex-1 overflow-y-auto no-scrollbar px-5 pb-28 pt-[84px] flex flex-col gap-3.5">

                    <textarea
                        value=${message}
                        onChange=${e => setMessage(e.target.value)}
                        maxLength="5000"
                        placeholder="输入要分享的文字内容"
                        className="w-full bg-slate-50 dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700 dark:text-slate-100 dark:placeholder-slate-600 rounded-2xl p-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/25 focus:border-blue-500 transition-all resize-none h-[88px] shrink-0"
                    ></textarea>

                    <div className="flex gap-3 shrink-0">
                        <${Stepper}
                            label="保存时间"
                            value=${TIME_OPTIONS[timeIndex].label}
                            dec=${() => setTimeIndex(Math.max(0, timeIndex - 1))}
                            inc=${() => setTimeIndex(Math.min(TIME_OPTIONS.length - 1, timeIndex + 1))}
                            disableDec=${timeIndex === 0}
                            disableInc=${timeIndex === TIME_OPTIONS.length - 1}
                        />
                        <${Stepper}
                            label="取件码数量"
                            value=${`${quantity} 个`}
                            dec=${() => setQuantity(Math.max(1, quantity - 1))}
                            inc=${() => setQuantity(Math.min(5, quantity + 1))}
                            disableDec=${quantity === 1}
                            disableInc=${quantity === 5}
                        />
                    </div>

                    <div
                        className=${`border-2 border-dashed rounded-2xl p-5 flex flex-col items-center justify-center text-center cursor-pointer shrink-0 transition-all duration-200
                            ${isDragging
                                ? 'border-blue-500 bg-blue-50 dark:bg-blue-500/10 scale-[1.01] shadow-inner shadow-blue-500/10'
                                : 'border-slate-200 dark:border-slate-700 hover:border-blue-400/60 dark:hover:border-blue-500/40 hover:bg-slate-50 dark:hover:bg-slate-800/50'}`}
                        onDragOver=${e => { e.preventDefault(); setIsDrag(true); }}
                        onDragLeave=${() => setIsDrag(false)}
                        onDrop=${e => { e.preventDefault(); setIsDrag(false); addFiles(e.dataTransfer.files); }}
                        onClick=${() => fileRef.current?.click()}
                    >
                        <input type="file" multiple className="hidden" ref=${fileRef} onChange=${e => addFiles(e.target.files)} />
                        <div className=${`w-10 h-10 rounded-full flex items-center justify-center mb-2 transition-all duration-200
                            ${isDragging ? 'bg-blue-500 text-white scale-110' : 'bg-white dark:bg-slate-700 shadow-sm text-blue-500'}`}>
                            <i className=${`fa-solid ${isDragging ? 'fa-hand-point-down' : 'fa-plus'} text-lg`}></i>
                        </div>
                        <p className="font-semibold text-sm text-slate-600 dark:text-slate-300">
                            ${isDragging ? '松开添加文件' : '点击或拖拽文件到此处'}
                        </p>
                        <p className="text-[11px] text-slate-400 dark:text-slate-500 mt-0.5">单文件最大 5 GB</p>
                    </div>

                    ${error && html`
                        <div className="bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/20 text-red-600 dark:text-red-400 text-sm px-4 py-2.5 rounded-xl flex items-center gap-2 animate-fade-in shrink-0">
                            <i className="fa-solid fa-circle-exclamation shrink-0"></i>
                            <span>${error}</span>
                        </div>
                    `}

                    ${files.length > 0 && html`
                        <div className="bg-white dark:bg-slate-800/70 rounded-2xl border border-slate-100 dark:border-slate-700 overflow-hidden shadow-sm shrink-0">
                            <div className="px-3 py-2 border-b border-slate-100 dark:border-slate-700/80 flex items-center justify-between">
                                <span className="text-xs font-bold text-slate-400 dark:text-slate-500">${files.length} 个文件 · ${formatBytes(totalSize)}</span>
                                <button
                                    onClick=${() => setFiles([])}
                                    className="text-[11px] text-red-400 hover:text-red-500 dark:text-red-400/70 dark:hover:text-red-400 font-semibold transition-colors px-2 py-0.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-500/10">
                                    全部清除
                                </button>
                            </div>
                            ${files.map((f, i) => {
                                const { cls, color } = getFileIcon(f.name);
                                return html`
                                    <div key=${i} className="flex items-center gap-3 px-3 py-2.5 hover:bg-slate-50 dark:hover:bg-slate-700/40 transition-colors group border-b border-slate-50 dark:border-slate-700/40 last:border-0">
                                        <i className=${`${cls} ${color} text-lg shrink-0 w-5 text-center`}></i>
                                        <div className="flex-1 min-w-0">
                                            <p className="text-sm font-medium text-slate-700 dark:text-slate-200 truncate">${f.name}</p>
                                            <p className="text-[11px] text-slate-400 dark:text-slate-500">${formatBytes(f.size)}</p>
                                        </div>
                                        <button
                                            onClick=${(e) => { e.stopPropagation(); setFiles(files.filter((_, j) => j !== i)); }}
                                            className="w-7 h-7 rounded-full flex items-center justify-center text-slate-300 dark:text-slate-600 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 transition-all opacity-0 group-hover:opacity-100">
                                            <i className="fa-solid fa-xmark text-sm"></i>
                                        </button>
                                    </div>
                                `;
                            })}
                        </div>
                    `}
                </div>

                <div className="absolute bottom-0 inset-x-0 p-5 bg-gradient-to-t from-white via-white/95 dark:from-[#121a2e] dark:via-[#121a2e]/95 to-transparent pointer-events-none">
                    <button
                        onClick=${handleSubmit}
                        disabled=${!canSubmit}
                        className=${`pointer-events-auto relative overflow-hidden w-full py-3.5 rounded-2xl font-bold text-[15px] text-white transition-all flex items-center justify-center gap-2
                            ${!canSubmit && !isUploading
                                ? 'bg-slate-200 dark:bg-slate-700 cursor-not-allowed text-slate-400 dark:text-slate-500'
                                : 'bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-600/30 active:scale-[0.98]'}`}>
                        ${isUploading ? (processing ? html`
                            <div className="absolute inset-0 bg-white/15"></div>
                            <i className="fa-solid fa-circle-notch fa-spin relative z-10"></i>
                            <span className="relative z-10">服务器处理中…</span>
                        ` : html`
                            <div className="absolute inset-y-0 left-0 bg-white/15 transition-all duration-300 ease-out rounded-l-2xl" style=${{ width: `${progress}%` }}></div>
                            <i className="fa-solid fa-circle-notch fa-spin relative z-10"></i>
                            <span className="relative z-10">上传中 ${progress}%</span>
                            ${speed && html`<span className="relative z-10 text-xs font-normal opacity-70">${speed}</span>`}
                        `) : html`
                            获取取件码
                            <i className="fa-solid fa-arrow-right text-sm"></i>
                        `}
                    </button>
                </div>
            </div>
        `;
    };

    // ── CodeView ───────────────────────────────────────────────────────────────
    const CodeView = ({ codes, retentionText, setView }) => {
        const showToast = useContext(ToastCtx);
        const [copied, setCopied] = useState(null);

        const handleCopyLink = async (code) => {
            const ok = await copyText(`${window.location.origin}/${code}`);
            if (ok) { setCopied(code); setTimeout(() => setCopied(null), 2000); }
            else    showToast('复制失败，请手动复制');
        };

        const handleCopyAll = async () => {
            const links = codes.map(c => `${window.location.origin}/${c}`).join('\n');
            const ok = await copyText(links);
            if (ok) showToast('所有链接已复制', 'success');
            else    showToast('复制失败');
        };

        const gridClass = codes.length === 4 ? 'grid grid-cols-2 gap-3 w-fit mx-auto'
                        : codes.length >= 5   ? 'grid grid-cols-3 gap-3 w-fit mx-auto'
                        : `flex justify-center gap-3`;

        return html`
            <div className="absolute inset-0 overflow-y-auto no-scrollbar px-6 pb-24 pt-[76px] flex flex-col items-center">
                <div className="flex-1 w-full flex flex-col items-center justify-center py-4">
                    <!-- Success badge -->
                    <div className="mb-4">
                        <div className="w-16 h-16 rounded-full bg-emerald-500 flex items-center justify-center shadow-lg shadow-emerald-500/30">
                            <i className="fa-solid fa-check text-white text-2xl"></i>
                        </div>
                    </div>
                    <h2 className="text-xl font-bold text-slate-800 dark:text-slate-100 mb-1">发送成功！</h2>
                    <p className="text-slate-400 dark:text-slate-500 text-sm mb-8">点击取件码可复制直达链接</p>

                    <!-- Code cards with stagger -->
                    <div className=${`${gridClass} mb-6 w-full`}>
                        ${codes.map((code, i) => html`
                            <div
                                key=${i}
                                onClick=${() => handleCopyLink(code)}
                                className="group relative w-[88px] h-[82px] rounded-[18px] cursor-pointer overflow-hidden select-none
                                    bg-gradient-to-b from-white to-slate-50/80 dark:from-slate-700 dark:to-slate-800
                                    border border-slate-200/80 dark:border-slate-600/80 shadow-sm
                                    hover:shadow-lg hover:shadow-blue-500/15 hover:-translate-y-1 hover:border-blue-400/60 dark:hover:border-blue-500/60 transition-all duration-150">
                                <!-- Number -->
                                <div className=${`absolute inset-0 flex items-center justify-center text-[2.75rem] font-black font-mono text-slate-700 dark:text-slate-100 transition-opacity duration-150 ${copied === code ? 'opacity-0' : 'group-hover:opacity-0'}`}>
                                    ${code}
                                </div>
                                <!-- Hover overlay -->
                                <div className=${`absolute inset-0 bg-blue-600 flex flex-col items-center justify-center transition-opacity duration-150 rounded-[inherit] ${copied === code ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'}`}>
                                    <i className=${`fa-solid ${copied === code ? 'fa-check' : 'fa-link'} text-white text-xl mb-1`}></i>
                                    <span className="text-white text-[10px] font-semibold">${copied === code ? '已复制' : '复制链接'}</span>
                                </div>
                                <!-- Glossy top highlight -->
                                <div className="absolute inset-x-0 top-0 h-1/3 bg-gradient-to-b from-white/60 dark:from-white/10 to-transparent rounded-t-[inherit] pointer-events-none"></div>
                            </div>
                        `)}
                    </div>

                    <!-- Info card -->
                    <div className="w-full max-w-[280px] bg-slate-50 dark:bg-slate-800/60 border border-slate-100 dark:border-slate-700 rounded-2xl px-4 py-3 text-center mb-4">
                        <p className="text-[13px] text-slate-600 dark:text-slate-300 flex items-center justify-center gap-1.5">
                            <i className="fa-regular fa-clock text-blue-500 text-xs"></i>
                            <span className="font-bold text-blue-600 dark:text-blue-400">${retentionText}</span>内有效
                            ${codes.length > 1 && html` · <span class="text-slate-400 dark:text-slate-500">每码仅限使用一次</span>`}
                        </p>
                    </div>

                    ${codes.length > 1 && html`
                        <button onClick=${handleCopyAll} className="text-sm text-slate-400 dark:text-slate-500 hover:text-blue-500 dark:hover:text-blue-400 flex items-center gap-1.5 transition-colors py-1">
                            <i className="fa-solid fa-copy text-xs"></i> 复制全部链接
                        </button>
                    `}
                </div>

                <!-- Bottom: re-send button -->
                <div className="w-full pb-2">
                    <button
                        onClick=${() => setView('send')}
                        className="w-full py-3 rounded-2xl font-semibold text-sm text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-500/10 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                        <i className="fa-solid fa-plus-circle"></i> 再发一次
                    </button>
                </div>
            </div>
        `;
    };

    // ── ReceiveView ────────────────────────────────────────────────────────────
    const ReceiveView = ({ setView, setDownloadData, initialCode, clearInitialCode }) => {
        const showToast = useContext(ToastCtx);
        const [input, setInput]       = useState('');
        const [error, setError]       = useState(false);
        const [checking, setChecking] = useState(false);
        const verifiedRef             = useRef('');   // code already submitted — never re-verify it

        useEffect(() => {
            if (initialCode && input === '') {
                setTimeout(() => setInput(initialCode), 250);
                clearInitialCode();   // consume once — never auto-fill a stale code on re-entry
            }
        }, [initialCode]);

        useEffect(() => {
            // Reset the guard once the input is cleared so the user can retry.
            if (input.length < 2) { verifiedRef.current = ''; return; }
            if (!error && !checking && verifiedRef.current !== input) {
                verifiedRef.current = input;
                verifyCode(input);
            }
        }, [input, error, checking]);

        const press = useCallback((key) => {
            if (checking) return;
            if (error) setError(false);
            setInput(prev => {
                if (key === 'del')   return prev.slice(0, -1);
                if (key === 'clear') return '';
                return prev.length < 2 ? prev + key : prev;
            });
        }, [checking, error]);

        useEffect(() => {
            const onKey = (e) => {
                const tag = document.activeElement.tagName;
                if (tag === 'INPUT' || tag === 'TEXTAREA' || checking) return;
                if (/^[0-9]$/.test(e.key))           press(e.key);
                else if (e.key === 'Backspace')       press('del');
                else if (e.key === 'Escape' || e.key === 'Delete') press('clear');
            };
            window.addEventListener('keydown', onKey);
            return () => window.removeEventListener('keydown', onKey);
        }, [press, checking]);

        const verifyCode = async (code) => {
            setChecking(true);
            try {
                const res = await fetch(`${API}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code }),
                });
                if (res.ok) {
                    const data = await res.json();
                    setDownloadData({
                        ...data,
                        files: data.files.map((f, i) => ({ ...f, url: `${API}/download/${data.token}/${i}` })),
                    });
                    setInput('');          // clear so the consumed code doesn't linger / re-fire
                    setView('confirm');
                } else {
                    throw new Error();
                }
            } catch {
                setError(true);
                setTimeout(() => { setInput(''); setError(false); }, 800);
            } finally {
                setChecking(false);
            }
        };

        // Accept a bare code ("42") or a copied link ("domain.com/42", "https://x.com/42?ref=1").
        const extractCode = (raw) => {
            const t = (raw || '').trim();
            if (/^\d{2}$/.test(t)) return t;
            const m = t.match(/\/(\d{2})\/?(?:[?#].*)?$/);
            return m ? m[1] : null;
        };

        const pasteCode = async () => {
            try {
                const code = extractCode(await navigator.clipboard.readText());
                if (code) setInput(code);
                else showToast('剪贴板中没有发现取件码或链接');
            } catch { showToast('无法读取剪贴板（请授权）'); }
        };

        const digitCls = (filled, err) =>
            `w-20 h-[90px] rounded-2xl flex items-center justify-center text-[2.8rem] font-black font-mono select-none transition-all duration-200
            ${err ? 'animate-shake bg-red-50 dark:bg-red-500/10 border-2 border-red-400 text-red-500'
                  : filled ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/30 scale-[1.02]'
                           : 'bg-slate-100 dark:bg-slate-800 text-slate-200 dark:text-slate-700 border-2 border-slate-200 dark:border-slate-700'}`;

        return html`
            <div className="absolute inset-0 px-6 pb-6 pt-[84px] flex flex-col">
                <div className="flex-1 flex flex-col items-center justify-center">
                    <!-- Status label -->
                    <div className="h-8 flex items-center justify-center mb-7">
                        ${checking
                            ? html`<span className="text-blue-500 dark:text-blue-400 text-sm font-semibold flex items-center gap-2">
                                <i className="fa-solid fa-circle-notch fa-spin"></i> 验证中...
                              </span>`
                            : html`<span className="text-slate-500 dark:text-slate-400 text-sm font-medium">输入取件码</span>`}
                    </div>

                    <!-- Digit display -->
                    <div className="flex gap-4 mb-3 relative">
                        <div className=${digitCls(input.length >= 1, error)}>${input[0] || ''}</div>
                        <div className=${digitCls(input.length >= 2, error)}>${input[1] || ''}</div>
                    </div>

                    <!-- Error hint -->
                    <div className=${`mb-9 h-5 transition-all duration-300 ${error ? 'opacity-100' : 'opacity-0'}`}>
                        <p className="text-red-500 text-xs font-semibold text-center">取件码无效或已过期</p>
                    </div>

                    <!-- Keypad — 4×3 fixed grid, no conditional elements -->
                    <div className="grid grid-cols-3 gap-2.5 w-full max-w-[272px]">
                        ${[1,2,3,4,5,6,7,8,9].map(n => html`
                            <button key=${n} onClick=${() => press(String(n))}
                                className="key-btn h-[60px] rounded-2xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 text-[22px] font-semibold text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700/60 hover:border-blue-300/60 dark:hover:border-blue-500/40 active:scale-95 transition-all shadow-sm">
                                ${n}
                            </button>
                        `)}
                        <!-- paste: active when empty, faded when digits entered -->
                        <button
                            onClick=${() => input === '' && pasteCode()}
                            className=${`key-btn h-[60px] rounded-2xl transition-all flex flex-col items-center justify-center gap-0.5
                                ${input === '' && !checking
                                    ? 'bg-slate-100/80 dark:bg-slate-800/60 text-slate-500 dark:text-slate-400 hover:bg-slate-200/60 dark:hover:bg-slate-700/60 active:scale-95'
                                    : 'bg-slate-100/40 dark:bg-slate-800/30 text-slate-300 dark:text-slate-600 cursor-default'}`}>
                            <i className="fa-regular fa-clipboard text-lg"></i>
                            <span className="text-[9px] font-semibold">粘贴</span>
                        </button>
                        <button onClick=${() => press('0')}   className="key-btn h-[60px] rounded-2xl bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 text-[22px] font-semibold text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700/60 hover:border-blue-300/60 dark:hover:border-blue-500/40 active:scale-95 transition-all shadow-sm">0</button>
                        <button onClick=${() => press('del')} className="key-btn h-[60px] rounded-2xl bg-slate-100/80 dark:bg-slate-800/60 text-slate-500 dark:text-slate-400 hover:bg-slate-200/60 dark:hover:bg-slate-700/60 active:scale-95 transition-all flex items-center justify-center">
                            <i className="fa-solid fa-delete-left text-xl"></i>
                        </button>
                    </div>
                </div>
            </div>
        `;
    };

    // ── ConfirmView ────────────────────────────────────────────────────────────
    const ConfirmView = ({ setView, data }) => {
        const showToast = useContext(ToastCtx);
        const [copied, setCopied]           = useState(false);
        const [dlIdx, setDlIdx]             = useState(-1);
        const [dlProgress, setDlProgress]   = useState(0);
        const [dlSpeed, setDlSpeed]         = useState('');
        const [downloadedSet, setDownloaded] = useState(new Set());
        const destroyRef = useRef(false);
        const autoRef    = useRef(false);

        if (!data) return null;

        const allDone = data.files?.length > 0 && data.files.every((_, i) => downloadedSet.has(i));

        useEffect(() => {
            const destroy = () => {
                if (destroyRef.current || !data?.token) return;
                destroyRef.current = true;
                navigator.sendBeacon(`${API}/destroy`,
                    new Blob([JSON.stringify({ token: data.token })], { type: 'application/json' }));
            };
            window.addEventListener('beforeunload', destroy);
            return () => { window.removeEventListener('beforeunload', destroy); destroy(); };
        }, [data]);

        useEffect(() => {
            if (data?.files?.length === 1 && !data.message && !autoRef.current) {
                autoRef.current = true;
                setTimeout(() => handleDownload(0), 400);
            }
        }, [data]);

        const handleCopyText = async () => {
            const ok = await copyText(data.message);
            if (ok) { setCopied(true); setTimeout(() => setCopied(false), 2000); }
            else    showToast('复制失败，请手动选中文本');
        };

        const handleDownload = (index) => {
            if (dlIdx !== -1) return Promise.resolve();
            return new Promise(resolve => {
                const file = data.files[index];
                setDlIdx(index); setDlProgress(0); setDlSpeed('');
                const xhr = new XMLHttpRequest();
                xhr.open('GET', file.url, true);
                xhr.responseType = 'blob';
                let lastLoaded = 0, lastTime = Date.now();
                xhr.onprogress = (e) => {
                    if (!e.lengthComputable) return;
                    setDlProgress(Math.floor(e.loaded / e.total * 100));
                    const now = Date.now(), dt = (now - lastTime) / 1000;
                    if (dt >= 0.5) {
                        setDlSpeed(formatSpeed((e.loaded - lastLoaded) / dt));
                        lastLoaded = e.loaded; lastTime = now;
                    }
                };
                xhr.onload = () => {
                    if (xhr.status === 200) {
                        const url = URL.createObjectURL(xhr.response);
                        const a = document.createElement('a');
                        a.href = url; a.download = file.name || 'download';
                        document.body.appendChild(a); a.click(); document.body.removeChild(a);
                        setTimeout(() => URL.revokeObjectURL(url), 2000);
                        setDownloaded(prev => new Set([...prev, index]));
                    } else {
                        showToast('下载失败：文件可能已被销毁');
                    }
                    setDlIdx(-1); resolve();
                };
                xhr.onerror = () => { showToast('网络异常，下载中断'); setDlIdx(-1); resolve(); };
                xhr.send();
            });
        };

        const handleDownloadAll = async () => {
            if (!data.files || dlIdx !== -1) return;
            for (let i = 0; i < data.files.length; i++) {
                await handleDownload(i);
                if (i < data.files.length - 1) await new Promise(r => setTimeout(r, 400));
            }
        };

        return html`
            <div className="absolute inset-0 flex flex-col">

                <!-- Scrollable content — no absolute padding trick; just flex-1 -->
                <div className="flex-1 overflow-y-auto no-scrollbar px-5 pt-[84px] pb-4 flex flex-col gap-5">
                    <h2 className="text-base font-bold shrink-0 flex items-center gap-2">
                        ${allDone
                            ? html`<i className="fa-solid fa-circle-check text-emerald-500"></i><span className="text-emerald-500 dark:text-emerald-400">接收成功</span>`
                            : html`<span className="text-slate-700 dark:text-slate-200">接收文件</span>`}
                    </h2>

                    ${data.message && html`
                        <div className="shrink-0">
                            <p className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-2">文字内容</p>
                            <div className="relative bg-slate-50 dark:bg-slate-800/60 border border-slate-100 dark:border-slate-700 p-4 pr-12 rounded-2xl text-sm text-slate-700 dark:text-slate-200 whitespace-pre-wrap min-h-[72px] leading-relaxed">
                                ${data.message}
                                <button
                                    onClick=${handleCopyText}
                                    className="absolute top-3 right-3 w-8 h-8 flex items-center justify-center rounded-xl bg-white dark:bg-slate-700 shadow-sm border border-slate-200 dark:border-slate-600 text-slate-400 hover:text-blue-500 active:scale-95 transition-all">
                                    <i className=${`fa-solid ${copied ? 'fa-check text-emerald-500' : 'fa-copy'} text-sm`}></i>
                                </button>
                            </div>
                        </div>
                    `}

                    ${data.files?.length > 0 && html`
                        <div className="shrink-0">
                            <p className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-2">
                                文件 (${data.files.length})
                                ${allDone && html` · <span class="text-emerald-500 normal-case font-semibold">全部已接收</span>`}
                            </p>
                            <div className="space-y-2">
                                ${data.files.map((file, idx) => {
                                    const { cls, color } = getFileIcon(file.name);
                                    const isActive = dlIdx === idx;
                                    const isDone   = downloadedSet.has(idx);
                                    return html`
                                        <div key=${idx} className="bg-white dark:bg-slate-800/70 border border-slate-100 dark:border-slate-700 rounded-2xl flex items-center gap-3 p-3 shadow-sm">
                                            <div className="w-10 h-10 rounded-xl bg-slate-50 dark:bg-slate-700/60 flex items-center justify-center shrink-0">
                                                ${isActive
                                                    ? html`<i className="fa-solid fa-circle-notch fa-spin text-blue-500 text-lg"></i>`
                                                    : html`<i className=${`${cls} ${color} text-lg`}></i>`}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <p className=${`text-sm font-medium truncate ${isDone ? 'text-slate-400 dark:text-slate-500' : 'text-slate-700 dark:text-slate-200'}`}>${file.name}</p>
                                                ${isActive ? html`
                                                    <div className="flex items-center gap-2 mt-1">
                                                        <div className="flex-1 h-1 bg-blue-100 dark:bg-blue-500/20 rounded-full overflow-hidden">
                                                            <div className="h-full bg-blue-500 rounded-full transition-all duration-300 ease-out" style=${{ width: `${dlProgress}%` }}></div>
                                                        </div>
                                                        <span className="text-[11px] text-blue-500 font-semibold whitespace-nowrap tabular-nums">${dlProgress}%${dlSpeed ? ` · ${dlSpeed}` : ''}</span>
                                                    </div>
                                                ` : html`<p className="text-[11px] text-slate-400 dark:text-slate-500">${isDone ? '已下载' : formatBytes(file.size)}</p>`}
                                            </div>
                                            ${!isActive && html`
                                                <button
                                                    onClick=${() => handleDownload(idx)}
                                                    disabled=${dlIdx !== -1}
                                                    className="w-9 h-9 rounded-full flex items-center justify-center shrink-0 text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-500/10 disabled:opacity-40 transition-all">
                                                    <i className=${`fa-solid ${isDone ? 'fa-rotate-right' : 'fa-download'} text-base`}></i>
                                                </button>
                                            `}
                                        </div>
                                    `;
                                })}
                            </div>
                        </div>
                    `}
                </div>

                <!-- Bottom action — in-flow, no absolute, button appears right below content -->
                <div className="shrink-0 px-5 pb-6 pt-2">
                    ${allDone ? html`
                        <button
                            onClick=${() => setView('home')}
                            className="w-full py-3.5 rounded-2xl font-bold text-[15px] text-white bg-emerald-500 hover:bg-emerald-600 shadow-lg shadow-emerald-500/30 active:scale-[0.98] transition-all">
                            完成
                        </button>
                    ` : data.files?.length > 0 ? html`
                        <button
                            onClick=${handleDownloadAll}
                            disabled=${dlIdx !== -1}
                            className=${`w-full py-3.5 rounded-2xl font-bold text-[15px] text-white transition-all flex items-center justify-center gap-2
                                ${dlIdx !== -1
                                    ? 'bg-blue-400 cursor-wait'
                                    : 'bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-600/30 active:scale-[0.98]'}`}>
                            ${dlIdx !== -1
                                ? html`<i className="fa-solid fa-circle-notch fa-spin"></i> 下载中...`
                                : html`<i className="fa-solid fa-download"></i> ${data.files.length === 1 ? '下载文件' : '全部下载'}`}
                        </button>
                    ` : html`
                        <button
                            onClick=${handleCopyText}
                            className="w-full py-3.5 rounded-2xl font-bold text-[15px] text-white bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-600/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                            <i className=${`fa-solid ${copied ? 'fa-check' : 'fa-copy'}`}></i>
                            ${copied ? '已复制' : '复制文字'}
                        </button>
                    `}
                </div>
            </div>
        `;
    };

    // ── App ────────────────────────────────────────────────────────────────────
    // Forward navigation map: which destinations are "forward" from each source
    const FWD = { home: ['send','receive'], send: ['code'], receive: ['confirm'] };

    const App = () => {
        const [view, setView]               = useState('home');
        const [leavingView, setLeavingView] = useState(null);   // view currently animating out
        const [enterCls, setEnterCls]       = useState('');     // CSS class for entering view
        const [leaveCls, setLeaveCls]       = useState('');     // CSS class for leaving view
        const transRef                      = useRef(false);

        const [codes, setCodes]             = useState([]);
        const [retention, setRetention]     = useState('10 小时');
        const [downloadData, setDownload]   = useState(null);
        const [initialCode, setInitialCode] = useState(null);
        const [toasts, setToasts]           = useState([]);

        const showToast = useCallback((msg, type = 'error') => {
            const id = Date.now() + Math.random();
            setToasts(prev => [...prev, { id, msg, type }]);
            setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 2800);
        }, []);

        const navigate = useCallback((next) => {
            if (next === view || transRef.current) return;
            transRef.current = true;
            const fwd = FWD[view]?.includes(next) ?? false;
            const toHome = next === 'home';
            setEnterCls(toHome ? 'page-in-home' : fwd ? 'page-in-right' : 'page-in-left');
            setLeaveCls(fwd ? 'page-out-left' : 'page-out-right');
            setLeavingView(view);
            setView(next);
            setTimeout(() => { setLeavingView(null); transRef.current = false; }, 420);
        }, [view]);

        useEffect(() => {
            const loader = document.getElementById('startup-loader');
            if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 400); }

            const code = window.location.pathname.slice(1);
            if (/^\d{2}$/.test(code)) {
                setInitialCode(code);
                setView('receive');
                window.history.replaceState({}, '', '/');
            }
        }, []);

        const PAGE_TITLE = {
            send: '上传文件', code: '取件码', receive: '接收文件', confirm: '接收文件',
        };

        // Lock header title while fading out — never update on return to home
        const [headerTitle, setHeaderTitle] = useState('');
        useEffect(() => {
            if (view !== 'home') setHeaderTitle(PAGE_TITLE[view] || '');
        }, [view]);

        // Render helper: picks the right component for a given view name
        const renderView = (v) => {
            if (v === 'home')    return html`<${HomeView}    setView=${navigate} />`;
            if (v === 'send')    return html`<${SendView}    setView=${navigate} setGeneratedCodes=${setCodes} setRetentionDisplay=${setRetention} />`;
            if (v === 'code')    return html`<${CodeView}    codes=${codes} retentionText=${retention} setView=${navigate} />`;
            if (v === 'receive') return html`<${ReceiveView} setView=${navigate} setDownloadData=${setDownload} initialCode=${initialCode} clearInitialCode=${() => setInitialCode(null)} />`;
            if (v === 'confirm') return html`<${ConfirmView} setView=${navigate} data=${downloadData} />`;
            return null;
        };

        return html`
            <${ToastCtx.Provider} value=${showToast}>
                <div className="w-full flex flex-col items-center">
                    <div className="relative w-full h-[660px] max-h-[92vh] glass-card rounded-[2rem] overflow-hidden flex flex-col">

                        <!-- Header (hidden on home) -->
                        <div className=${`absolute inset-x-0 top-0 h-[68px] z-30 flex items-center justify-between px-5
                            bg-white/88 dark:bg-[#121a2e]/88 backdrop-blur-xl
                            border-b border-slate-200/60 dark:border-slate-700/40
                            transition-all duration-300 ${view === 'home' ? 'opacity-0 pointer-events-none -translate-y-2' : 'opacity-100 translate-y-0'}`}>
                            <div className="flex items-center gap-2.5">
                                <img src=${APP_ICON} alt="Flashdrop" className="w-7 h-7" />
                                <span className="font-bold text-slate-800 dark:text-slate-100 text-[15px]">
                                    ${headerTitle}
                                </span>
                            </div>
                            <button
                                onClick=${() => navigate('home')}
                                className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-700/60 transition-colors text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300">
                                <i className="fa-solid fa-xmark text-base"></i>
                            </button>
                        </div>

                        <${Toasts} list=${toasts} />

                        <!-- Content: leaving view exits, entering view comes in simultaneously -->
                        <div className="flex-1 relative overflow-hidden">
                            ${leavingView && html`
                                <div key=${leavingView} className=${`absolute inset-0 ${leaveCls} pointer-events-none z-10`}>
                                    ${renderView(leavingView)}
                                </div>
                            `}
                            <div key=${view} className=${`absolute inset-0 ${enterCls} z-20`}>
                                ${renderView(view)}
                            </div>
                        </div>
                    </div>

                    <p className="text-slate-400/50 text-[11px] mt-4 font-medium tracking-wide select-none">
                        2022 – 2026 © HaoyuHuang · Flashdrop
                    </p>
                </div>
            <//>
        `;
    };

    ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
    </script>
</body>
</html>
